# Ofelia cron job configuration
# Each [job-exec] executes a command inside the specified container.

[job-exec "daily-database-backup"]
schedule = 0 2 * * *
container = ai_gateway_backup
command = pg_dump -h postgres -U postgres ai_gateway > /backups/ai_gateway_$(date +%%Y%%m%%d_%%H%%M%%S).sql

[job-exec "weekly-cleanup-old-backups"]
schedule = 0 3 * * 0
container = ai_gateway_backup
command = sh -c "find /backups -name 'ai_gateway_*.sql' -mtime +30 -delete"
