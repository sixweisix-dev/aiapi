# Ofelia cron job configuration
# Each [job-exec] executes a command inside the specified container.

[job-exec "daily-database-backup"]
schedule = 0 2 * * *
container = ai_gateway_backup
command = sh -c "pg_dump -h postgres -U postgres ai_gateway > /backups/ai_gateway_$(date +%%Y%%m%%d_%%H%%M%%S).sql"

[job-exec "weekly-cleanup-old-backups"]
schedule = 0 3 * * 0
container = ai_gateway_backup
command = sh -c "find /backups -name 'ai_gateway_*.sql' -mtime +30 -delete"

[job-exec "daily-cost-report"]
schedule = 0 1 * * *
container = ai_gateway_backend
command = sh -c "wget --quiet --header=\"X-Cron-Token: $INTERNAL_CRON_TOKEN\" --post-data='' -O - http://localhost:8080/v1/internal/daily-report"

[job-exec "restock-check"]
schedule = 0 9 * * *
container = ai_gateway_backend
command = sh -c "wget --quiet --header=\"X-Cron-Token: $INTERNAL_CRON_TOKEN\" --post-data='' -O - http://localhost:8080/v1/internal/restock-check"

[job-exec "promo-date-check"]
schedule = 1 0 * * *
container = ai_gateway_backend
command = sh -c "wget --quiet --header=\"X-Cron-Token: $INTERNAL_CRON_TOKEN\" --post-data='' -O - http://localhost:8080/v1/internal/promo-check"
