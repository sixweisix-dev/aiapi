version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_gateway_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - ai_gateway_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: ai_gateway_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - ai_gateway_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_gateway_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_gateway?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai_gateway_network
    logging: *default-logging

  caddy:
    image: caddy:2-alpine
    container_name: ai_gateway_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ai_gateway_network
    depends_on:
      - backend
      - frontend_admin
      - frontend_user
    logging: *default-logging

  frontend_admin:
    image: nginx:alpine
    container_name: ai_gateway_admin
    restart: unless-stopped
    volumes:
      - ./frontend/admin/dist:/usr/share/nginx/html:ro
      - ./frontend/admin/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ai_gateway_network
    logging: *default-logging

  frontend_user:
    image: nginx:alpine
    container_name: ai_gateway_user
    restart: unless-stopped
    volumes:
      - ./frontend/user/dist:/usr/share/nginx/html:ro
      - ./frontend/user/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ai_gateway_network
    logging: *default-logging

  # Scheduled database backup via Ofelia cron runner
  backup:
    image: postgres:16-alpine
    container_name: ai_gateway_backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    environment:
      PGPASSWORD: postgres
    entrypoint:
      - sh
      - -c
      - "while true; do sleep 3600; done"
    networks:
      - ai_gateway_network
    logging: *default-logging

  ofelia:
    image: mcuadros/ofelia:latest
    container_name: ai_gateway_cron
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/ofelia/config.ini:/etc/ofelia/config.ini:ro
    depends_on:
      - backup
    logging: *default-logging

networks:
  ai_gateway_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config: